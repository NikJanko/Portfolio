<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects - Portfolio</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Decorative Elements -->
    <div id="leftDecorations" class="decorations left-decorations"></div>
    <div id="rightDecorations" class="decorations right-decorations"></div>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <h1 class="nav-logo"><a href="index.html">My Portfolio</a></h1>
            <ul class="nav-menu">
                <li><a href="index.html#intro">Home</a></li>
                <li><a href="index.html#education">Education</a></li>
                <li><a href="index.html#awards">Awards</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="index.html#links">Links</a></li>
                <li>
                    <label class="dark-mode-toggle">
                        <input type="checkbox" id="darkModeToggle" class="dark-mode-input">
                        <span class="dark-mode-emoji" id="darkModeEmoji">☀️</span>
                    </label>
                </li>
            </ul>
        </div>
    </nav>

    <section class="section projects-page">
        <div class="section-title">Projects</div>

        <!-- Toggle Switch -->
        <div class="toggle-container">
            <label class="toggle-switch">
                <input type="checkbox" id="timelineToggle" class="toggle-input">
                <span class="toggle-label">Enable Timeline View</span>
            </label>
        </div>

        <!-- Timeline Bar (Hidden by default) -->
        <div id="timelineBar" class="timeline-bar hidden">
            <div class="timeline-track">
                <div class="timeline-section past">
                    <span class="timeline-icon">🦖</span>
                    <span class="timeline-label">Past</span>
                </div>
                <div class="timeline-section current">
                    <span class="timeline-icon">🏙️</span>
                    <span class="timeline-label">Current</span>
                </div>
                <div class="timeline-section future">
                    <span class="timeline-icon">🚀</span>
                    <span class="timeline-label">Future</span>
                </div>
            </div>
            <div class="timeline-slider">
                <input type="range" id="timelineSlider" min="0" max="2" value="1" class="slider">
            </div>
        </div>

        <!-- Section Headers with Content (Hidden when timeline is active) -->
        <div id="sectionHeaders" class="section-headers">
            <div class="section-header">
                <h3>Past Projects</h3>
            </div>
            <div class="section-header">
                <h3>Current Projects</h3>
            </div>
            <div class="section-header">
                <h3>Future Projects</h3>
            </div>
        </div>

        <!-- Projects Grid -->
        <div class="projects-grid" id="projectsGrid"></div>
    </section>

    <!-- Modal for Expanded Project Card -->
    <div id="projectModal" class="modal hidden">
        <div class="modal-content">
            <button class="modal-close">&times;</button>
            <div class="modal-header">
                <img id="modalImage" src="" alt="Project Image" class="modal-image">
            </div>
            <div class="modal-body">
                <h2 id="modalTitle"></h2>
                <div class="modal-section">
                    <h3>Summary</h3>
                    <p id="modalSummary"></p>
                </div>
                <div class="modal-section">
                    <h3>Challenges</h3>
                    <p id="modalChallenges"></p>
                </div>
                <div class="modal-section">
                    <h3>Tools & Technologies</h3>
                    <div id="modalTools" class="tools-list"></div>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>&copy; 2026 My Portfolio. All rights reserved.</p>
    </footer>

    <script src="darkmode.js"></script>
    <script src="data.js"></script>
    <script src="projects.js"></script>
</body>
</html>
